# Configuración de la Base de Datos PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# captura la URL real de HTTPS del entorno de Codespaces
server.forward-headers-strategy=framework

# Fuerza a Hibernate a actualizar las tablas automáticamente en Postgres
spring.jpa.hibernate.ddl-auto=update

# Corrige el mapeo de nombres de columnas (como current_output) para que coincidan con Insomnia
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


server.port=8080
